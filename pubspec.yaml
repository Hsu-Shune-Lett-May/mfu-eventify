name: mfu_eventify
description: A campus event reminder app for MFU students

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  lucide_icons: ^0.257.0
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.5+1
  connectivity_plus: ^7.0.0
  flutter_local_notifications: ^17.2.4   # was ^21.0.0-dev.2
  timezone: ^0.9.4                        
  intl: ^0.20.2
  firebase_auth: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_icons:
  android: true
  ios: false
  image_path: assets/icon/logo.jpg
  adaptive_icon_background: "#FFFFFF"



flutter:
  uses-material-design: true

  assets:
    - assets/icon/